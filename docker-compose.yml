services:
  orpheusmorebetter:
    image: ghcr.io/chodeus/orpheusmorebetter:main@sha256:314b8211df3432d16b98c0fb10ee83f5312d0093e558052d0ca0b0a33965a9dd
    container_name: orpheusmorebetter
    hostname: orpheusmorebetter
    stdin_open: true
    tty: true
    environment:
      - PUID=99
      - PGID=100
      - UMASK=002
      - TZ=America/Los_Angeles
    volumes:
      - ./config:/config
      - /path/to/your/data:/data/torrents
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # The entrypoint briefly runs as root to remap PUID/PGID and chown
    # /config before dropping privileges via su-exec. Without these caps,
    # cap_drop:ALL above would break the user-switch and chown steps.
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - FOWNER
      - DAC_OVERRIDE
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    restart: "no"
