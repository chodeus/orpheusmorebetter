name: "Docker Publish (main/dev push)"

on:
  push:
    branches:
      - main
      - dev
    tags:
      - 'v*'
    paths:
      - 'Dockerfile'
      - 'start.sh'
      - 'requirements.txt'
      - 'pyproject.toml'
      - '_version.py'
      - 'orpheusmorebetter'
      - 'models/**'
      - 'services/**'
  workflow_dispatch:

concurrency:
  group: docker-build-${{ github.ref_name }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      critical_vulns: ${{ steps.vuln_count.outputs.critical }}
      high_vulns: ${{ steps.vuln_count.outputs.high }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
          build-args: |
            VERSION=${{ github.ref_name }}
            GIT_BRANCH=${{ github.ref_name }}
            BUILD_DATE=${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}

      - name: Run Trivy vulnerability scanner
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: '${{ fromJSON(steps.meta.outputs.json).tags[0] }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        if: github.event_name != 'pull_request' && always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Count vulnerabilities
        id: vuln_count
        if: github.event_name != 'pull_request' && always()
        run: |
          if [ -f trivy-results.sarif ]; then
            CRITICAL=$(jq '[.runs[].results[] | select(.level=="error")] | length' trivy-results.sarif 2>/dev/null || echo "0")
            HIGH=$(jq '[.runs[].results[] | select(.level=="warning")] | length' trivy-results.sarif 2>/dev/null || echo "0")
            echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
            echo "high=$HIGH" >> $GITHUB_OUTPUT
          else
            echo "critical=0" >> $GITHUB_OUTPUT
            echo "high=0" >> $GITHUB_OUTPUT
          fi

  log-build:
    needs: build-and-push
    if: always() && github.event_name != 'pull_request'
    uses: ./.github/workflows/discord-notify.yml
    with:
      event_type: 'build'
      status: ${{ needs.build-and-push.result }}
      title: "Docker Build Complete (${{ github.ref_name }})"
      description: "Build triggered by push to ${{ github.ref_name }}."
      commit_sha: ${{ github.sha }}
      image_tag: "ghcr.io/${{ github.repository }}:${{ github.ref_name }}"
      include_commit_link: true
    secrets:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

  log-security:
    needs: build-and-push
    if: always() && github.event_name != 'pull_request' && needs.build-and-push.result != 'skipped'
    uses: ./.github/workflows/discord-notify.yml
    with:
      event_type: 'security'
      status: 'info'
      title: "Security Scan Results (${{ github.ref_name }})"
      commit_sha: ${{ github.sha }}
      include_commit_link: true
      critical_vulns: ${{ needs.build-and-push.outputs.critical_vulns }}
      high_vulns: ${{ needs.build-and-push.outputs.high_vulns }}
    secrets:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
